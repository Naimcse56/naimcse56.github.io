/* =========================
   EXTRA GALLERY DESIGN ONLY
========================= */

.gallery-wrap{
    padding-top:120px;
}

/* CARD */
.gallery-card{
    position:relative;
    overflow:hidden;
    border-radius:22px;
    background:rgba(30,41,59,0.6);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.05);
    transition:0.4s ease;
}

/* IMAGE */
.gallery-img{
    width:100%;
    height:280px;
    object-fit:cover;
    transition:0.6s ease;
}

/* HOVER EFFECT */
.gallery-card:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:
        0 20px 50px rgba(255,45,32,0.15),
        0 0 30px rgba(56,189,248,0.10);
}

/* IMAGE ZOOM */
.gallery-card:hover img{
    transform:scale(1.12);
}

/* OVERLAY */
.gallery-card::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.65), transparent 60%);
    opacity:0;
    transition:0.4s;
}

.gallery-card:hover::after{
    opacity:1;
}

/* ICON */
.view-icon{
    position:absolute;
    bottom:15px;
    right:15px;
    background:#ff2d20;
    width:42px;
    height:42px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:14px;
    transform:scale(0);
    transition:0.3s;
}

.gallery-card:hover .view-icon{
    transform:scale(1);
}

/* TITLE */
.page-title{
    text-align:center;
    font-size:40px;
    font-weight:800;
    margin-bottom:10px;
}

.page-title span{

.sub-text{

    max-width:600px;
    margin:auto;
    margin-bottom:40px;
}

</style>
